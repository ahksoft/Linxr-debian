name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-qcow2:
    name: Build Alpine base image
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache base.qcow2.gz
        id: cache
        uses: actions/cache@v4
        with:
          path: android/app/src/main/assets/vm/base.qcow2.gz
          key: qcow2-${{ hashFiles('scripts/_build_rootfs.sh') }}

      - name: Set up QEMU (for ARM64 emulation)
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build base.qcow2.gz
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash scripts/build_qcow2.sh

      - uses: actions/upload-artifact@v4
        with:
          name: base-qcow2
          path: android/app/src/main/assets/vm/base.qcow2.gz
          retention-days: 1

  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: build-qcow2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: base-qcow2
          path: android/app/src/main/assets/vm/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Prepare build dirs & debug keystore
        run: |
          mkdir -p android/app/src/main/jniLibs
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,O=Android,C=US" 2>/dev/null

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build debug APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: linxr-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
