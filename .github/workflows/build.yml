name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-qemu:
    name: Build QEMU binaries (Android arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache QEMU binaries
        id: cache-qemu
        uses: actions/cache@v4
        with:
          path: android/app/src/main/jniLibs/arm64-v8a
          key: qemu-android-arm64-${{ hashFiles('docker/Dockerfile.qemu') }}

      - name: Build QEMU for Android arm64
        if: steps.cache-qemu.outputs.cache-hit != 'true'
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          # Download pre-built QEMU binaries from Termux bootstrap
          # These are statically linked aarch64 binaries that run on Android
          TERMUX_PKG="https://packages.termux.dev/apt/termux-main/pool/main/q"
          # Find latest qemu-system package
          PKG_URL=$(curl -s "https://packages.termux.dev/apt/termux-main/dists/stable/main/binary-aarch64/Packages" \
            | grep -A5 "^Package: qemu-system-aarch64-headless" | grep "^Filename:" | head -1 | awk '{print $2}')
          if [ -z "$PKG_URL" ]; then
            echo "Falling back to qemu-system package"
            PKG_URL=$(curl -s "https://packages.termux.dev/apt/termux-main/dists/stable/main/binary-aarch64/Packages" \
              | grep -A5 "^Package: qemu-system" | grep "^Filename:" | head -1 | awk '{print $2}')
          fi
          echo "Downloading: https://packages.termux.dev/$PKG_URL"
          curl -fsSL "https://packages.termux.dev/$PKG_URL" -o /tmp/qemu.deb
          cd /tmp && ar x qemu.deb && tar -xf data.tar.xz 2>/dev/null || tar -xf data.tar.gz 2>/dev/null
          find /tmp -name "qemu-system-aarch64" -type f | head -3
          QEMU_BIN=$(find /tmp -name "qemu-system-aarch64" -type f | head -1)
          cp "$QEMU_BIN" android/app/src/main/jniLibs/arm64-v8a/libqemu.so
          # qemu-img
          PKG_URL2=$(curl -s "https://packages.termux.dev/apt/termux-main/dists/stable/main/binary-aarch64/Packages" \
            | grep -A5 "^Package: qemu-utils" | grep "^Filename:" | head -1 | awk '{print $2}')
          if [ -n "$PKG_URL2" ]; then
            curl -fsSL "https://packages.termux.dev/$PKG_URL2" -o /tmp/qemu-utils.deb
            cd /tmp && mkdir utils && cd utils && ar x /tmp/qemu-utils.deb && tar -xf data.tar.xz 2>/dev/null || tar -xf data.tar.gz 2>/dev/null
            QIMG_BIN=$(find /tmp/utils -name "qemu-img" -type f | head -1)
            [ -n "$QIMG_BIN" ] && cp "$QIMG_BIN" android/app/src/main/jniLibs/arm64-v8a/libqemu_img.so
          fi
          ls -lh android/app/src/main/jniLibs/arm64-v8a/

      - name: Verify binaries
        run: ls -lh android/app/src/main/jniLibs/arm64-v8a/

      - uses: actions/upload-artifact@v4
        with:
          name: qemu-libs
          path: android/app/src/main/jniLibs/arm64-v8a/
          retention-days: 1

  build-qcow2:
    name: Build Alpine base image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache base.qcow2.gz
        id: cache
        uses: actions/cache@v4
        with:
          path: android/app/src/main/assets/vm/base.qcow2.gz
          key: qcow2-${{ hashFiles('scripts/_build_rootfs.sh') }}

      - name: Set up QEMU (for ARM64 emulation)
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build base.qcow2.gz
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash scripts/build_qcow2.sh

      - name: Download Alpine kernel & initramfs (arm64)
        run: |
          OUTDIR="android/app/src/main/assets/vm"
          BASE_URL="https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/aarch64/netboot"
          mkdir -p "$OUTDIR"
          curl -fsSL "$BASE_URL/vmlinuz-virt"   -o "$OUTDIR/vmlinuz-virt"
          curl -fsSL "$BASE_URL/initramfs-virt" -o "$OUTDIR/initramfs-virt"
          ls -lh "$OUTDIR/"

      - uses: actions/upload-artifact@v4
        with:
          name: base-qcow2
          path: |
            android/app/src/main/assets/vm/base.qcow2.gz
            android/app/src/main/assets/vm/vmlinuz-virt
            android/app/src/main/assets/vm/initramfs-virt
          retention-days: 1

  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: [build-qemu, build-qcow2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: base-qcow2
          path: android/app/src/main/assets/vm/

      - uses: actions/download-artifact@v4
        with:
          name: qemu-libs
          path: android/app/src/main/jniLibs/arm64-v8a/

      - name: Verify all assets
        run: |
          echo "=== VM assets ===" && ls -lh android/app/src/main/assets/vm/
          echo "=== QEMU libs ===" && ls -lh android/app/src/main/jniLibs/arm64-v8a/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,O=Android,C=US" 2>/dev/null

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build debug APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: linxr-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
