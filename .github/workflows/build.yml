name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-qcow2:
    name: Build Debian base image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache base.qcow2.gz
        id: cache
        uses: actions/cache@v4
        with:
          path: android/app/src/main/assets/vm/base.qcow2.gz
          key: qcow2-debian-${{ hashFiles('scripts/_build_debian_rootfs.sh') }}

      - name: Set up QEMU (for ARM64 emulation)
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build base.qcow2.gz
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p android/app/src/main/assets/vm
          docker run --rm --privileged \
            -v $(pwd)/android/app/src/main/assets/vm:/out \
            --platform linux/arm64 \
            debian:bookworm \
            bash -c "
              apt-get update && apt-get install -y qemu-system-aarch64 qemu-utils wget libguestfs-tools
              $(cat scripts/_build_debian_rootfs.sh | tail -n +3)
            "

      - uses: actions/upload-artifact@v4
        with:
          name: base-qcow2
          path: |
            android/app/src/main/assets/vm/base.qcow2.gz
            android/app/src/main/assets/vm/vmlinuz-virt
            android/app/src/main/assets/vm/initramfs-virt
          retention-days: 1

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: build-qcow2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: base-qcow2
          path: android/app/src/main/assets/vm/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Run unit tests
        run: flutter test

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: linxr-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: linxr-release
          path: build/app/outputs/flutter-apk/app-release.apk
