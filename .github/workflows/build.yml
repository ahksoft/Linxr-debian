name: Build APK

on:
  push:
    branches: [main, master, alpine-to-debian]
  workflow_dispatch:

jobs:
  build-qcow2:
    name: Build Debian base image
    runs-on: ubuntu-latest
    container:
      image: lazymio/qemu-full:v7.2.8
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Cache base.qcow2.gz
        id: cache
        uses: actions/cache@v4
        with:
          path: android/app/src/main/assets/vm
          key: qcow2-debian-bookworm-dnsmasq-a53-v1

      - name: Mount binfmt_misc
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mount binfmt_misc -t binfmt_misc /proc/sys/fs/binfmt_misc
          update-binfmts --display
          ls /opt/binfmt_fixed/ | awk '{print $1}' | xargs -L 1 update-binfmts --importdir /opt/binfmt_fixed --unimport
          ls /opt/binfmt_fixed/ | awk '{print $1}' | xargs -L 1 update-binfmts --importdir /opt/binfmt_fixed --import
          ls /opt/binfmt_fixed/ | awk '{print $1}' | xargs -L 1 update-binfmts --enable

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          apt update && apt install -y libguestfs-tools linux-image-generic debootstrap

      - name: Build Debian rootfs with DNS fix
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p android/app/src/main/assets/vm
          bash scripts/build_debian_complete.sh
          mv /out/* android/app/src/main/assets/vm/
          ls -lh android/app/src/main/assets/vm/

      - uses: actions/upload-artifact@v4
        with:
          name: base-qcow2
          path: |
            android/app/src/main/assets/vm/base.qcow2.gz
            android/app/src/main/assets/vm/vmlinuz-virt
            android/app/src/main/assets/vm/initramfs-virt
          retention-days: 1

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: build-qcow2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: base-qcow2
          path: android/app/src/main/assets/vm/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Run unit tests
        run: flutter test

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: linxr-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: linxr-release
          path: build/app/outputs/flutter-apk/app-release.apk
