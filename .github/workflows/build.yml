name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-qemu:
    name: Build QEMU binaries (Android arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache QEMU binaries
        id: cache-qemu
        uses: actions/cache@v4
        with:
          path: android/app/src/main/jniLibs/arm64-v8a
          key: qemu-android-arm64-${{ hashFiles('docker/Dockerfile.qemu') }}

      - name: Build QEMU for Android arm64
        if: steps.cache-qemu.outputs.cache-hit != 'true'
        run: |
          set -e
          OUTDIR="$GITHUB_WORKSPACE/android/app/src/main/jniLibs/arm64-v8a"
          mkdir -p "$OUTDIR"
          BASE="https://packages.termux.dev/apt/termux-main"

          # Resolve latest package filenames from index
          PKGS=$(curl -fsSL "$BASE/dists/stable/main/binary-aarch64/Packages")
          QEMU_DEB=$(echo "$PKGS" | grep -A15 "^Package: qemu-system-aarch64-headless" | grep "^Filename:" | head -1 | awk '{print $2}')
          QIMG_DEB=$(echo "$PKGS" | grep -A15 "^Package: qemu-utils" | grep "^Filename:" | head -1 | awk '{print $2}')
          echo "qemu-system: $QEMU_DEB"
          echo "qemu-utils:  $QIMG_DEB"

          # Download and extract qemu-system-aarch64
          curl -fsSL "$BASE/$QEMU_DEB" -o /tmp/qemu-system.deb
          mkdir -p /tmp/qemu-system-extract
          cd /tmp/qemu-system-extract
          ar x /tmp/qemu-system.deb
          tar -xf data.tar.xz
          QEMU_BIN=$(find . -name "qemu-system-aarch64" -type f | head -1)
          echo "Found: $QEMU_BIN ($(du -sh $QEMU_BIN | cut -f1))"
          cp "$QEMU_BIN" "$OUTDIR/libqemu.so"

          # Download and extract qemu-img
          curl -fsSL "$BASE/$QIMG_DEB" -o /tmp/qemu-utils.deb
          mkdir -p /tmp/qemu-utils-extract
          cd /tmp/qemu-utils-extract
          ar x /tmp/qemu-utils.deb
          tar -xf data.tar.xz
          QIMG_BIN=$(find . -name "qemu-img" -type f | head -1)
          echo "Found: $QIMG_BIN ($(du -sh $QIMG_BIN | cut -f1))"
          cp "$QIMG_BIN" "$OUTDIR/libqemu_img.so"

          ls -lh "$OUTDIR/"

      - name: Verify binaries
        run: ls -lh android/app/src/main/jniLibs/arm64-v8a/

      - uses: actions/upload-artifact@v4
        with:
          name: qemu-libs
          path: android/app/src/main/jniLibs/arm64-v8a/
          retention-days: 1

  build-qcow2:
    name: Build Alpine base image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache base.qcow2.gz
        id: cache
        uses: actions/cache@v4
        with:
          path: android/app/src/main/assets/vm/base.qcow2.gz
          key: qcow2-${{ hashFiles('scripts/_build_rootfs.sh') }}

      - name: Set up QEMU (for ARM64 emulation)
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build base.qcow2.gz
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash scripts/build_qcow2.sh

      - name: Download Alpine kernel & initramfs (arm64)
        run: |
          OUTDIR="android/app/src/main/assets/vm"
          BASE_URL="https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/aarch64/netboot"
          mkdir -p "$OUTDIR"
          curl -fsSL "$BASE_URL/vmlinuz-virt"   -o "$OUTDIR/vmlinuz-virt"
          curl -fsSL "$BASE_URL/initramfs-virt" -o "$OUTDIR/initramfs-virt"
          ls -lh "$OUTDIR/"

      - uses: actions/upload-artifact@v4
        with:
          name: base-qcow2
          path: |
            android/app/src/main/assets/vm/base.qcow2.gz
            android/app/src/main/assets/vm/vmlinuz-virt
            android/app/src/main/assets/vm/initramfs-virt
          retention-days: 1

  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: [build-qemu, build-qcow2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: base-qcow2
          path: android/app/src/main/assets/vm/

      - uses: actions/download-artifact@v4
        with:
          name: qemu-libs
          path: android/app/src/main/jniLibs/arm64-v8a/

      - name: Verify all assets
        run: |
          echo "=== VM assets ===" && ls -lh android/app/src/main/assets/vm/
          echo "=== QEMU libs ===" && ls -lh android/app/src/main/jniLibs/arm64-v8a/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug,O=Android,C=US" 2>/dev/null

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build debug APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: linxr-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
